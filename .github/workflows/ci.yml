name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Ensure local NuGet cache exists
        run: New-Item -ItemType Directory -Force -Path .\.nuget\packages | Out-Null

      - name: Restore app
        run: dotnet restore .\Accounting.csproj --configfile .\NuGet.Config

      - name: Build app
        run: dotnet build .\Accounting.csproj -c Release --no-restore -nologo

      - name: Restore integration tests
        run: dotnet restore .\tools\IntegrationTests\IntegrationTests.csproj --configfile .\NuGet.Config

      - name: Build integration tests
        run: dotnet build .\tools\IntegrationTests\IntegrationTests.csproj -c Release --no-restore -nologo
