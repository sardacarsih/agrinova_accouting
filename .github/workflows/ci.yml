name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore app
        run: dotnet restore .\Accounting.csproj

      - name: Build app
        run: dotnet build .\Accounting.csproj -c Release --no-restore -nologo

      - name: Restore integration tests
        run: dotnet restore .\tools\IntegrationTests\IntegrationTests.csproj

      - name: Build integration tests
        run: dotnet build .\tools\IntegrationTests\IntegrationTests.csproj -c Release --no-restore -nologo

